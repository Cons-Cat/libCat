name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 23 and build tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget lsb-release software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 23
          echo "/usr/lib/llvm-23/bin" >> "${GITHUB_PATH}"

      - name: Verify toolchain
        run: |
          command -v clang++-23
          clang++-23 --version
          command -v lld-23

      - name: Configure, build, and test (Debug)
        run: |
          cmake -S . -B build-debug -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-23 \
            -DCAT_USE_SANITIZERS=ON
          cmake --build build-debug
          ctest --test-dir build-debug --verbose --output-on-failure

      - name: Configure, build, and test (Release)
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-23
            -DCAT_USE_SANITIZERS=ON
          cmake --build build-release
          ctest --test-dir build-release --verbose --output-on-failure
