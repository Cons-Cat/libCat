      #     cmake -S . -B build-sde -G Ninja \
      #       -DCMAKE_BUILD_TYPE=Release \
      #       -DCMAKE_CXX_COMPILER=clang++-23 \
      #       -DCAT_USE_SANITIZERS=OFF \
      #       -DCAT_USE_SCCACHE=OFF \
      #       -DCAT_SDE_EXECUTABLE="${CAT_SDE_EXECUTABLE}"
