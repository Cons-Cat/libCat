# This file is flagrantly "vibe-coded". It may not be up to the standards of most libCat code.

name: Setup libCat toolchain
description: >
  Restore (or install + cache) the apt.llvm.org Clang 23 toolchain libCat
  needs in CI: clang / clang++, lld, llvm-ar / llvm-ranlib, llvm-symbolizer,
  clang-format, and `clang-tidy-23` (so `cmake/tidy.cmake` matches
  `clang++-23`). lldb-23 and clangd-23 are purged before the cache save.
  Version-suffixed `/usr/bin/*-23` symlinks
  are recreated after install or restore so a cache hit looks
  indistinguishable from a fresh `llvm.sh 23` run, which matters because
  `cmake/llvm_archivers.cmake` and `cmake/format.cmake` look up
  `llvm-ar-${MAJOR}` / `clang-format-${MAJOR}` derived from
  `CMAKE_CXX_COMPILER_VERSION`.

runs:
  using: composite
  steps:
    - name: Cache LLVM 23 toolchain
      id: cache-llvm
      uses: actions/cache@v4
      with:
        path: /usr/lib/llvm-23
        # Bump `-vN` whenever the install / purge set changes (new
        # tool, dropped purge, different LLVM major).
        key: llvm-23-ubuntu-24.04-v2

    - name: Install Clang 23 from apt.llvm.org (cache miss)
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -eu
        sudo apt-get update
        sudo apt-get install -y \
          wget lsb-release software-properties-common gnupg
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 23

        # `llvm-ar` / `llvm-ranlib` (used by
        # `cmake/llvm_archivers.cmake` for the LTO bitcode index)
        # ship in `llvm-23`. `clang-format-23` is what
        # `cmake/format.cmake` invokes for `cat-format-check`.
        # `clang-tidy-23` stays on the image: `include(cmake/tidy.cmake)` in
        # the root `CMakeLists.txt` must find a 23-series `clang-tidy`
        # matching the compiler, even for jobs that never run `cat-tidy`.
        # `run-clang-tidy-23` lives in `clang-tools-23` on Debian / Ubuntu
        # (used by `cmake/tidy.cmake`).
        sudo apt-get install -y llvm-23 clang-format-23 \
          clang-tidy-23 clang-tools-23

        # `libclang-rt-23-dev` is intentionally NOT purged.
        # `CMakeLists.txt` resolves `libclang_rt.asan-x86_64.so`
        # from clang's resource dir for `-shared-libasan`.
        sudo apt-get remove --purge -y \
          lldb-23 liblldb-23 python3-lldb-23 \
          clangd-23 \
          || true

        # `actions/cache` saves with a non-sudo `tar`, which would
        # silently fail on root-owned trees. Re-own to the runner
        # user. Linux ignores ownership for execve, so the binaries
        # still run.
        sudo chown -R "$(id -u):$(id -g)" /usr/lib/llvm-23

    - name: Recreate /usr/bin version-suffixed symlinks
      shell: bash
      run: |
        # apt's `update-alternatives` machinery owns
        # `/usr/bin/clang-23` etc. but only `/usr/lib/llvm-23` is in
        # the cache. Recreate the version-suffixed names so consumers
        # of `clang++-23` / `llvm-ar-23` / `clang-format-23` resolve
        # identically on cache hit and miss.
        set -eu
        for tool in \
          clang clang++ clang-cpp clang-format \
          lld ld.lld \
          llvm-ar llvm-ranlib llvm-symbolizer \
          clang-tidy run-clang-tidy
        do
          src="/usr/lib/llvm-23/bin/${tool}"
          if [ -x "${src}" ]; then
            sudo ln -sf "${src}" "/usr/bin/${tool}-23"
          fi
        done

    - name: Add /usr/lib/llvm-23/bin to PATH
      shell: bash
      run: echo "/usr/lib/llvm-23/bin" >> "${GITHUB_PATH}"

    - name: Register Clang warning matcher
      shell: bash
      run: echo "::add-matcher::${{ github.workspace }}/.github/problem-matchers/clang.json"

    - name: Install cmake and ninja-build
      # Tiny standard-archive packages, not worth caching. The
      # `apt-get update` here covers the cache-hit path.
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -eu
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends cmake ninja-build

    - name: Verify toolchain
      shell: bash
      run: |
        set -eu
        command -v clang++-23
        clang++-23 --version
        command -v lld-23
        command -v llvm-ar-23
        command -v llvm-ranlib-23
        command -v clang-format-23
        command -v clang-tidy-23
        command -v run-clang-tidy-23
