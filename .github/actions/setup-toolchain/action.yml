# This file is flagrantly "vibe-coded". It may not be up to the standards of most libCat code.

name: Setup libCat toolchain
description: >
  Install the mise-pinned Clang toolchain that libCat needs in CI:
  clang / clang++, lld, llvm-ar / llvm-ranlib, llvm-symbolizer,
  clang-format, clang-tidy, run-clang-tidy, and clang-repl.

runs:
  using: composite
  steps:
    - name: Register Clang warning matcher
      shell: bash
      run: echo "::add-matcher::${{ github.workspace }}/.github/problem-matchers/clang.json"

    - name: Install extraction dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -eu
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates curl python3 tar xz-utils zstd

    - name: Cache mise-pinned Clang toolchain
      uses: actions/cache@v4
      with:
        path: |
          .cache/cat-llvm
          .cache/cat-llvm-downloads
        key: cat-llvm-debs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', 'scripts/install_mise_llvm_debs.py') }}

    - name: Install mise
      uses: jdx/mise-action@v4
      with:
        version: 2026.3.10
        cache: false
        install: true

    - name: Install Clang toolchain
      shell: bash
      run: mise run install-clang-nightly

    - name: Add mise toolchain binaries to PATH
      shell: bash
      run: |
        set -eu
        tool_bin=$(mise exec -- sh -c 'dirname "$(command -v clang++)"')
        cmake_bin=$(mise exec -- sh -c 'dirname "$(command -v cmake)"')
        ninja_bin=$(mise exec -- sh -c 'dirname "$(command -v ninja)"')
        echo "${tool_bin}" >> "${GITHUB_PATH}"
        echo "${cmake_bin}" >> "${GITHUB_PATH}"
        echo "${ninja_bin}" >> "${GITHUB_PATH}"
        echo "CC=${tool_bin}/clang" >> "${GITHUB_ENV}"
        echo "CXX=${tool_bin}/clang++" >> "${GITHUB_ENV}"
        echo "CMAKE_GENERATOR=Ninja" >> "${GITHUB_ENV}"
        echo "CAT_LLVM_BIN=${tool_bin}" >> "${GITHUB_ENV}"

    - name: Verify mise toolchain
      shell: bash
      run: |
        set -eu
        command -v clang++
        clang++ --version
        major=$(clang++ --version | sed -n 's/.*version \([0-9][0-9]*\).*/\1/p' | head -1)
        if [ "${major}" -lt 23 ]; then
          echo "FAIL: libCat requires Clang 23+, got ${major}"
          exit 1
        fi
        command -v lld
        command -v ld.lld
        command -v llvm-ar
        command -v llvm-ranlib
        command -v llvm-symbolizer
        command -v clang-format
        command -v clangd
        command -v clang-tidy
        command -v run-clang-tidy
        command -v clang-apply-replacements
        command -v clang-repl
        command -v cmake
        cmake --version
        command -v ninja
        ninja --version
