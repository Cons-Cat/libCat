[tools]
cmake = "4.3.2"
just = "1.50.0"
ninja = "1.13.2"
ruff = "0.15.17"
sccache = "0.15.0"

[settings]
experimental = true

[env]
CAT_LLVM_VERSION = "unstable"
CC = "clang"
CXX = "clang++"
CMAKE_CXX_FLAGS = "-fdiagnostics-color=always"
CMAKE_GENERATOR = "Ninja Multi-Config"
CMAKE_LINKER_TYPE = "LLD"
CMAKE_EXPORT_COMPILE_COMMANDS = "ON"
_.path = [".cache/cat-llvm/bin", ".cache/cat-elfkickers/bin"]

[hooks]
postinstall = [
   { task = "install-clang-nightly" },
   { task = "install-elfkickers" },
]

[tasks.install-clang-nightly]
description = "Download and extract the pinned Clang 23 nightly toolchain."
run = "python3 scripts/install_mise_llvm_debs.py"

[tasks.install-elfkickers]
description = "Download, build, and stage the pinned ELFkickers utilities."
run = "python3 scripts/install_mise_elfkickers.py"
