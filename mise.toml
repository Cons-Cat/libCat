[tools]
cmake = "4.3.2"
ninja = "1.13.2"
sccache = "0.15.0"

[env]
CAT_LLVM_VERSION = "unstable"
CC = "clang"
CXX = "clang++"
CMAKE_CXX_FLAGS = "-fdiagnostics-color=always"
CMAKE_GENERATOR = "Ninja"
CMAKE_LINKER_TYPE = "LLD"
_.path = ".cache/cat-llvm/bin"

[tasks.install-toolchain]
description = "Download and extract the pinned Clang 23 nightly toolchain"
run = "python3 scripts/install_mise_llvm_debs.py"
